# ── Seyahat Blogu ── Hugo yapılandırması
baseURL = "https://eydhukuk.com/"
locale = "tr-TR"
defaultContentLanguage = "tr"
title = "Seyahat Günlüğü"
theme = "PaperMod"

enableRobotsTXT = false # robots.txt static/ klasöründen geliyor
removePathAccents = true # Türkçe karakterli URL'leri ASCII'ye çevirir (ş→s, ı→i)
enableEmoji = true
copyright = "© 2026 Seyahat Günlüğü"

[pagination]
  pagerSize = 9

[minify]
  disableXML = true

# Kategori sistemi: ülke ana kategori, şehir alt kategori, etiket serbest
[taxonomies]
  ulke = "ulke"
  sehir = "sehir"
  etiket = "etiket"

# PaperMod arama sayfası için JSON çıktısı gerekli
[outputs]
  home = ["HTML", "RSS", "JSON"]

# Sabit sayfalar temiz adreste açılsın: /seyahat-ipuclari/, /dil/, /hakkimda/
# :contentbasename = klasör adını birebir kullanır (başlıktaki Türkçe karakterlerden etkilenmez)
[permalinks]
  sayfalar = "/:contentbasename/"

[params]
  env = "production"
  title = "Seyahat Günlüğü"
  description = "Ülke ülke, şehir şehir seyahat notları, rehberler ve fotoğraflar"
  keywords = ["seyahat", "gezi", "seyahat blogu", "gezi rehberi"]
  author = "Elif"
  DateFormat = "2 January 2006"
  defaultTheme = "light"
  disableThemeToggle = true
  mainSections = ["posts"] # ana sayfada sadece blog yazıları listelenir (rotalar/sayfalar değil)

  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = true
  ShowToc = false
  hideSummary = false

  [params.homeInfoParams]
    Title = "Yollarda biriken hikâyeler"
    Content = "Gezdiğim ülkeler, şehirler ve yol boyu biriktirdiğim notlar — fotoğraflarıyla, rotalarıyla, küçük ipuçlarıyla."

  # Yazı kartlarında ve yazı sayfasında kapak fotoğrafı
  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    responsiveImages = true

  [params.fuseOpts] # arama hassasiyeti
    isCaseSensitive = false
    threshold = 0.4
    keys = ["title", "summary", "content"]

# Menü, özel header partial'ında dinamik kuruluyor (layouts/_partials/header.html):
#   Hazır Rotalar ▾ (rotalar bölümündeki sayfalardan) · menüye işaretli sabit sayfalar · Ara
# Bu yüzden burada [menu] tanımı yok.

# Sosyal paylaşım kartları (Open Graph / Twitter) PaperMod temasında yerleşik.
# Sitemap.xml ve canonical URL Hugo tarafından otomatik üretilir.
