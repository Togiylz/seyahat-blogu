<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Seyahat Günlüğü — Yönetim Paneli</title>
  <style>
    /* Giriş ekranı markalama (bozulursa Decap varsayılanına döner, işlev etkilenmez) */
    body { background: #FAFAF8; }
    [class*="AuthenticationPage"] button,
    [class*="StyledAuthenticationPage"] button {
      background-color: #4A7C59 !important;
      color: #ffffff !important;
      border-radius: 999px !important;
      padding: 12px 28px !important;
      font-weight: 600 !important;
    }
    [class*="AuthenticationPage"] button:hover,
    [class*="StyledAuthenticationPage"] button:hover {
      background-color: #3A6147 !important;
    }
  </style>
</head>
<body>
  <!-- Decap CMS: sürüm sabit (reproducibility + sürpriz regresyon önleme) -->
  <script src="https://unpkg.com/decap-cms@3.14.0/dist/decap-cms.js"></script>
  <script>
    // ── Görsel-yapıştırma çökmesini engelle (Decap bug #7585) ──
    // Panodan resim YAPIŞTIRMAK editörü çökertiyor. Resim yapıştırmayı yakalayıp
    // engelliyoruz ve kullanıcıyı doğru yola (+ butonu / sürükle-bırak) yönlendiriyoruz.
    // Sadece resim DOSYASI yapıştırınca devreye girer; metin yapıştırma etkilenmez.
    document.addEventListener("paste", function (e) {
      try {
        var dt = e.clipboardData || window.clipboardData;
        if (!dt || !dt.items) return;
        for (var i = 0; i < dt.items.length; i++) {
          if (dt.items[i].kind === "file" && dt.items[i].type.indexOf("image/") === 0) {
            e.preventDefault();
            e.stopPropagation();
            alert(
              "Fotoğrafı doğrudan yapıştıramazsın 🙂\n\n" +
              "Yazının içine fotoğraf eklemek için:\n" +
              "• Yazı alanındaki + işaretine bas ve 'Image' seç\n" +
              "• ya da fotoğraf dosyasını yazının üstüne sürükleyip bırak\n\n" +
              "Kapak fotoğrafı için yukarıdaki '🖼️ Kapak Fotoğrafı' alanını kullan."
            );
            return;
          }
        }
      } catch (err) { /* sessizce geç — yakalama başarısızsa normal akış sürer */ }
    }, true); // capture phase: editör işlemeden önce yakala

    // ── Canlı önizleme: yazının sitedeki görünümüne yakın bir sunum ──
    // Sitenin paleti ve fontları (Playfair Display / Inter / Lora) ile.
    CMS.registerPreviewStyle(
      "@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@500;600;700&display=swap');" +
      "body { background:#FAFAF8; margin:0; }" +
      ".pv-wrap { max-width:760px; margin:0 auto; padding:22px 26px 60px; font-family:'Inter',ui-sans-serif,system-ui,sans-serif; color:#1F2937; }" +
      ".pv-note { background:#E8F0EB; color:#3A6147; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:999px; display:inline-block; margin-bottom:18px; }" +
      ".pv-cover { width:100%; height:330px; object-fit:cover; border-radius:16px; display:block; }" +
      ".pv-caption { color:#6B7280; font-size:13px; text-align:center; margin-top:8px; font-style:italic; }" +
      ".pv-title { font-family:'Playfair Display',Georgia,serif; font-size:38px; line-height:1.2; margin:22px 0 10px; }" +
      ".pv-meta { color:#6B7280; font-size:14px; margin-bottom:10px; }" +
      ".pv-cips { margin:10px 0 4px; }" +
      ".pv-cip { background:#E8F0EB; color:#3A6147; font-size:13px; font-weight:500; padding:4px 12px; border-radius:999px; display:inline-block; margin:0 6px 6px 0; }" +
      ".pv-summary { font-family:'Lora',Georgia,serif; font-style:italic; color:#6B7280; border-left:3px solid #4A7C59; padding:2px 0 2px 14px; margin:16px 0 22px; font-size:16.5px; line-height:1.6; }" +
      ".pv-body { font-family:'Lora',Georgia,serif; font-size:17.5px; line-height:1.85; }" +
      ".pv-body h1, .pv-body h2, .pv-body h3 { font-family:'Playfair Display',Georgia,serif; line-height:1.3; }" +
      ".pv-body img { max-width:100%; border-radius:14px; }" +
      ".pv-body a { color:#4A7C59; }" +
      ".pv-body blockquote { border-left:3px solid #4A7C59; background:#E8F0EB; margin:1em 0; padding:10px 16px; border-radius:0 12px 12px 0; }" +
      ".pv-empty { color:#9CA3AF; font-style:italic; }",
      { raw: true }
    );

    var trTarih = function (raw) {
      if (!raw) return "";
      try {
        var d = new Date(raw);
        if (isNaN(d.getTime())) return String(raw);
        return d.toLocaleDateString("tr-TR", { day: "numeric", month: "long", year: "numeric" });
      } catch (e) { return String(raw); }
    };

    var listeYap = function (val) {
      if (!val) return [];
      if (val.toJS) return val.toJS();
      if (Array.isArray(val)) return val;
      return [val];
    };

    // Blog yazısı önizlemesi
    var YaziOnizleme = createClass({
      render: function () {
        var entry = this.props.entry;
        var baslik = entry.getIn(["data", "title"]) || "Başlık buraya gelecek…";
        var tarih = trTarih(entry.getIn(["data", "date"]));
        var ozet = entry.getIn(["data", "summary"]);
        var kapak = entry.getIn(["data", "cover", "image"]);
        var kapakAlt = entry.getIn(["data", "cover", "alt"]) || "";
        var kapakNot = entry.getIn(["data", "cover", "caption"]);
        var kapakUrl = kapak ? this.props.getAsset(kapak) : null;
        var cipler = listeYap(entry.getIn(["data", "ulke"]))
          .concat(listeYap(entry.getIn(["data", "sehir"])))
          .concat(listeYap(entry.getIn(["data", "etiket"])));

        return h("div", { className: "pv-wrap" },
          h("span", { className: "pv-note" }, "👁 Önizleme — yazının sitede görüneceği hâli"),
          kapakUrl
            ? h("div", null,
                h("img", { className: "pv-cover", src: kapakUrl.toString(), alt: kapakAlt }),
                kapakNot ? h("div", { className: "pv-caption" }, kapakNot) : null)
            : h("div", { className: "pv-empty" }, "Kapak fotoğrafı eklenince burada görünecek"),
          h("h1", { className: "pv-title" }, baslik),
          tarih ? h("div", { className: "pv-meta" }, tarih + " · Elif") : null,
          cipler.length
            ? h("div", { className: "pv-cips" }, cipler.map(function (c, i) {
                return h("span", { className: "pv-cip", key: i }, String(c));
              }))
            : null,
          ozet ? h("div", { className: "pv-summary" }, ozet) : null,
          h("div", { className: "pv-body" }, this.props.widgetFor("body") ||
            h("p", { className: "pv-empty" }, "Yazı içeriği buraya gelecek…"))
        );
      }
    });
    CMS.registerPreviewTemplate("posts", YaziOnizleme);

    // Hakkımda sayfası önizlemesi
    var SayfaOnizleme = createClass({
      render: function () {
        var entry = this.props.entry;
        return h("div", { className: "pv-wrap" },
          h("span", { className: "pv-note" }, "👁 Önizleme"),
          h("h1", { className: "pv-title" }, entry.getIn(["data", "title"]) || ""),
          h("div", { className: "pv-body" }, this.props.widgetFor("body"))
        );
      }
    });
    CMS.registerPreviewTemplate("sayfalar", SayfaOnizleme);
  </script>
</body>
</html>
