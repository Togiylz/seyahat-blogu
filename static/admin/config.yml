# ── Decap CMS yapılandırması ──
# Giriş: Netlify üzerinde GitHub OAuth provider kurulu olmalı
# (Site configuration → Access & security → OAuth → Install provider → GitHub).
backend:
  name: github
  repo: Togiylz/seyahat-blogu
  branch: main
  commit_messages:
    create: "Yeni yazı: {{slug}}"
    update: "Güncelleme: {{slug}}"
    delete: "Silindi: {{slug}}"
    uploadMedia: "Görsel yüklendi: {{path}}"
    deleteMedia: "Görsel silindi: {{path}}"

locale: "tr" # panel arayüzü Türkçe
site_url: https://eydhukuk.com
display_url: https://eydhukuk.com
logo_url: /images/admin-logo.svg

# Dosya/adres isimleri her zaman temiz ASCII olsun (ş→s, ı→i, boşluk→tire)
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# Genel medya klasörü; yazı görselleri yazının kendi klasörüne gider
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Yazıları"
    label_singular: "Yazı"
    description: "Yeni yazı için sağ üstteki 'Yazı' butonuna bas. Yazarken sağ tarafta yazının sitede nasıl görüneceğini canlı izleyebilirsin. Yayınla dediğinde site 1 dakika içinde güncellenir."
    folder: "content/posts"
    create: true
    delete: true
    # Her yazı kendi klasöründe: content/posts/yazi-adi/index.md + görselleri
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    slug: "{{slug}}"
    summary: "{{title}} — {{fields.ulke}} · {{day}}.{{month}}.{{year}}"
    sortable_fields: ["date", "title"]
    view_groups:
      - label: "Ülkeye Göre"
        field: ulke
      - label: "Yıla Göre"
        field: date
        pattern: "\\d{4}"
    editor:
      preview: true
    fields:
      - label: "📝 Başlık"
        name: "title"
        widget: "string"
        hint: "Yazının başlığı. Örnek: Kapadokya'da 3 Gün"

      - label: "📅 Yayın Tarihi"
        name: "date"
        widget: "datetime"
        date_format: "DD.MM.YYYY"
        time_format: false
        hint: "Bugünün tarihi otomatik gelir, genelde dokunmana gerek yok."

      - label: "🖼️ Kapak Fotoğrafı"
        name: "cover"
        widget: "object"
        collapsed: false
        hint: "Yazının en üstünde ve ana sayfadaki kartında görünecek fotoğraf."
        fields:
          - label: "Fotoğraf"
            name: "image"
            widget: "image"
            hint: "Tıkla ve bilgisayarından seç ya da sürükleyip bırak."
          - label: "Fotoğraf Açıklaması"
            name: "alt"
            widget: "string"
            required: true
            hint: "Fotoğrafta ne göründüğünü kısaca yaz (örn: Gün doğumunda peri bacaları üzerinde balonlar). Google ve görme engelli okuyucular için önemli."
          - label: "Fotoğraf Altyazısı"
            name: "caption"
            widget: "string"
            required: false
            hint: "İsteğe bağlı — fotoğrafın altında görünen küçük not."

      - label: "🌍 Ülke"
        name: "ulke"
        widget: "select"
        multiple: true
        min: 1
        max: 3
        hint: "Yazının hangi ülke(ler)le ilgili olduğunu seç. Yazınca listede aratabilirsin. (Bölge sayfaları bu seçime göre otomatik dolar.)"
        # Ülke listesi: aşağıdaki bölgeler de (rotalar) aynı listeyi kullanır (&ulkeler / *ulkeler).
        # Yeni ülke eklemek için bu listeye bir satır ekle, yeter.
        options: &ulkeler
          - "Almanya"
          - "Amerika Birleşik Devletleri"
          - "Arjantin"
          - "Arnavutluk"
          - "Avustralya"
          - "Avusturya"
          - "Azerbaycan"
          - "Belçika"
          - "Birleşik Arap Emirlikleri"
          - "Brezilya"
          - "Bulgaristan"
          - "Çekya"
          - "Çin"
          - "Danimarka"
          - "Endonezya"
          - "Estonya"
          - "Fas"
          - "Filipinler"
          - "Finlandiya"
          - "Fransa"
          - "Güney Afrika"
          - "Güney Kore"
          - "Gürcistan"
          - "Hindistan"
          - "Hırvatistan"
          - "Hollanda"
          - "Irak"
          - "İngiltere"
          - "İran"
          - "İrlanda"
          - "İspanya"
          - "İsrail"
          - "İsveç"
          - "İsviçre"
          - "İtalya"
          - "İzlanda"
          - "Japonya"
          - "Kamboçya"
          - "Kanada"
          - "Karadağ"
          - "Katar"
          - "Kazakistan"
          - "Kenya"
          - "Kıbrıs"
          - "Kolombiya"
          - "Kosova"
          - "Küba"
          - "Letonya"
          - "Litvanya"
          - "Lübnan"
          - "Lüksemburg"
          - "Macaristan"
          - "Maldivler"
          - "Malezya"
          - "Malta"
          - "Meksika"
          - "Mısır"
          - "Norveç"
          - "Özbekistan"
          - "Peru"
          - "Polonya"
          - "Portekiz"
          - "Romanya"
          - "Rusya"
          - "Singapur"
          - "Sırbistan"
          - "Slovakya"
          - "Slovenya"
          - "Sri Lanka"
          - "Şili"
          - "Tayland"
          - "Tayvan"
          - "Tunus"
          - "Türkiye"
          - "Ukrayna"
          - "Umman"
          - "Ürdün"
          - "Vietnam"
          - "Yeni Zelanda"
          - "Yunanistan"

      - label: "🏙️ Şehir"
        name: "sehir"
        widget: "list"
        hint: "Şehrin adını yaz ve 'Ekle' butonuna bas. Birden fazla şehir ekleyebilirsin."
        field: { label: "Şehir Adı", name: "ad", widget: "string" }

      - label: "🏷️ Etiketler"
        name: "etiket"
        widget: "list"
        required: false
        hint: "İsteğe bağlı. Örnek: Yemek, Doğa, Bütçe, Rehber, Müze"
        field: { label: "Etiket", name: "ad", widget: "string" }

      - label: "💬 Özet"
        name: "summary"
        widget: "text"
        hint: "Ana sayfadaki yazı kartında görünecek 1-2 cümle. Okuyucuyu yazıya çekecek kısa bir tanıtım yaz."

      - label: "✏️ Yazı"
        name: "body"
        widget: "markdown"
        buttons: ["bold", "italic", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list", "link"]
        editor_components: ["image"]
        hint: "Yazını buraya yaz. Ara başlık için H2 kullan. Araya fotoğraf eklemek için + işaretine basıp 'Image' seç ya da fotoğraf dosyasını sürükle-bırak. (Fotoğrafı kopyala-yapıştır YAPMA, çalışmaz.)"

  - name: "rotalar"
    label: "Hazır Rotalar (Bölgeler)"
    label_singular: "Bölge"
    description: "Menüdeki 'Hazır Rotalar' altında çıkan bölgeler. Her bölge, seçtiğin ülkelerle etiketli TÜM yazıları otomatik listeler. İstersen yeni bölge de ekleyebilirsin (örn. Amerika)."
    folder: "content/rotalar"
    create: true
    delete: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    slug: "{{slug}}"
    # Sadece gerçek bölgeler listelensin; _index.md (Hazır Rotalar sayfası) burada çıkmasın
    filter: { field: "tip", value: "bolge" }
    sortable_fields: ["weight", "title"]
    editor:
      preview: true
    fields:
      - { label: "(otomatik) tür", name: "tip", widget: "hidden", default: "bolge" }
      - { label: "📛 Bölge Adı", name: "title", widget: "string", hint: "Menüde ve sayfada görünecek ad. Örn: Türkiye, Avrupa, Asya" }
      - { label: "🔢 Menü Sırası", name: "weight", widget: "number", default: 50, value_type: "int", hint: "Küçük sayı menüde önce gelir. (Türkiye 10, Avustralya 20, Avrupa 30, Asya 40)" }
      - label: "🌍 Hangi ülkeleri kapsıyor?"
        name: "ulkeler"
        widget: "select"
        multiple: true
        min: 1
        hint: "Bu sayfada, seçtiğin ülkelerle etiketli tüm yazılar otomatik toplanır. Örn: Avrupa için İtalya, Fransa, İspanya seç."
        options: *ulkeler
      - label: "🖼️ Üst Görsel"
        name: "cover"
        widget: "object"
        collapsed: false
        required: false
        hint: "İsteğe bağlı. Bölge sayfasının en üstünde büyük görünecek kapak fotoğrafı. Eklemezsen sadece başlık görünür."
        fields:
          - { label: "Fotoğraf", name: "image", widget: "image", required: false }
          - { label: "Fotoğraf Açıklaması", name: "alt", widget: "string", required: false }
      - { label: "✏️ Tanıtım Yazısı", name: "body", widget: "markdown", required: false, hint: "Bölge sayfasının üstünde çıkacak kısa giriş." }

  - name: "sayfalar"
    label: "Sabit Sayfalar"
    label_singular: "Sayfa"
    description: "Hakkımda, Seyahat İpuçları, Dil gibi bağımsız sayfalar. Yeni sayfa açıp menüye ekleyebilirsin."
    folder: "content/sayfalar"
    create: true
    delete: true
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    slug: "{{slug}}"
    sortable_fields: ["weight", "title"]
    editor:
      preview: true
    fields:
      - { label: "📝 Sayfa Başlığı", name: "title", widget: "string" }
      - label: "🖼️ Üst Görsel"
        name: "cover"
        widget: "object"
        collapsed: true
        required: false
        hint: "İsteğe bağlı. Sayfanın en üstünde büyük görünecek kapak fotoğrafı."
        fields:
          - { label: "Fotoğraf", name: "image", widget: "image", required: false }
          - { label: "Fotoğraf Açıklaması", name: "alt", widget: "string", required: false }
      - { label: "📌 Menüde göster", name: "menude", widget: "boolean", default: true, hint: "Açıksa üst menüde görünür. Kapatırsan sayfa var olur ama menüde çıkmaz." }
      - { label: "🔢 Menü Sırası", name: "weight", widget: "number", default: 50, value_type: "int", hint: "Küçük sayı menüde önce gelir." }
      - { label: "(otomatik) tarih/okuma gizle", name: "hidemeta", widget: "hidden", default: true }
      - { label: "(otomatik) içindekiler gizle", name: "showtoc", widget: "hidden", default: false }
      - label: "✏️ İçerik"
        name: "body"
        widget: "markdown"
        buttons: ["bold", "italic", "heading-two", "heading-three", "quote", "bulleted-list", "numbered-list", "link"]
        editor_components: ["image"]
        hint: "Sayfa içeriğini buraya yaz. Fotoğraf için + işaretine basıp 'Image' seç ya da sürükle-bırak. (Kopyala-yapıştır değil.)"

  - name: "site"
    label: "Site Metinleri"
    label_singular: "Metin"
    description: "Ana sayfanın ve Hazır Rotalar sayfasının üst yazıları. Buradan yeni sayfa eklenmez; sadece var olan metinleri düzenlersin."
    editor:
      preview: false
    files:
      - label: "Ana Sayfa — Üst Yazı"
        name: "anasayfa"
        file: "content/_index.md"
        description: "Ana sayfanın en üstündeki büyük başlık ve tanıtım cümlesi."
        fields:
          - { label: "🏷️ Büyük Başlık", name: "hero_baslik", widget: "string", hint: "Ana sayfanın en üstünde büyük yazan başlık." }
          - { label: "💬 Tanıtım Cümlesi", name: "hero_metin", widget: "text", hint: "Başlığın altındaki 1-2 cümlelik tanıtım." }
      - label: "Hazır Rotalar — Sayfa Yazısı"
        name: "rotalar_index"
        file: "content/rotalar/_index.md"
        description: "Menüde 'Hazır Rotalar'a tıklayınca açılan sayfanın başlığı ve açıklaması."
        fields:
          - { label: "📛 Sayfa Başlığı", name: "title", widget: "string", hint: "Örn: Hazır Rotalar" }
          - { label: "💬 Açıklama", name: "aciklama", widget: "text", hint: "Başlığın altındaki kısa açıklama yazısı." }
          - label: "🖼️ Üst Görsel"
            name: "cover"
            widget: "object"
            collapsed: true
            required: false
            hint: "İsteğe bağlı. Hazır Rotalar sayfasının en üstünde büyük görünecek görsel."
            fields:
              - { label: "Fotoğraf", name: "image", widget: "image", required: false }
              - { label: "Fotoğraf Açıklaması", name: "alt", widget: "string", required: false }
