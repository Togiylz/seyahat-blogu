{{- /* Yazı içi görseller: tema mantığıyla co-located resource'u çöz ve yayınla,
       sonra şık bir <figure> (yuvarlak köşe, opsiyonel altyazı, lazy-load) ile sar. */ -}}
{{- $u := urls.Parse .Destination -}}
{{- $src := $u.String -}}
{{- if not $u.IsAbs -}}
  {{- $path := strings.TrimPrefix "./" $u.Path -}}
  {{- with or (.PageInner.Resources.Get $path) (resources.Get $path) -}}
    {{- $src = .RelPermalink -}}
    {{- with $u.RawQuery }}{{ $src = printf "%s?%s" $src . }}{{ end -}}
    {{- with $u.Fragment }}{{ $src = printf "%s#%s" $src . }}{{ end -}}
  {{- end -}}
{{- end -}}
<figure class="post-figure">
  <img src="{{ $src }}" alt="{{ .Text }}" loading="lazy" decoding="async">
  {{- with .Title }}<figcaption>{{ . }}</figcaption>{{ end -}}
</figure>
{{- /**/ -}}
