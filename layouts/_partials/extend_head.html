{{- /* Google Fonts: Playfair Display (başlık), Inter (arayüz), Lora (içerik) */ -}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

{{- /* JSON-LD yapısal veri: blog yazıları için rich snippet desteği */ -}}
{{- if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": {{ .Title | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02" | jsonify }},
  "description": {{ .Summary | plainify | jsonify }},
  "author": { "@type": "Person", "name": {{ site.Params.author | jsonify }} },
  "url": {{ .Permalink | jsonify }}
  {{- with .Params.cover.image }},
  "image": {{ . | absURL | jsonify }}
  {{- end }}
}
</script>
{{- end }}
